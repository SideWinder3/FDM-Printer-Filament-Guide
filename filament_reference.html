<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Filament Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --green: #00AE42;
  --orange: #EA5E1A;
  --navy: #122C34;
  --navy-mid: #1a3d4a;
  --navy-light: #1f4d5e;
  --bg: #0a1a20;
  --surface: #0f2530;
  --surface2: #152d38;
  --surface3: #1a3540;
  --border: rgba(0,174,66,0.15);
  --border-bright: rgba(0,174,66,0.4);
  --text: #e8f4f0;
  --text-muted: #7aada0;
  --text-dim: #3d7068;
  --mono: 'Space Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --radius: 6px;
  --radius-lg: 12px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── GRID NOISE TEXTURE ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

/* ── HEADER ── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10, 26, 32, 0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 20px;
}

.logo {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--green);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  white-space: nowrap;
  flex-shrink: 0;
}

.logo span {
  color: var(--orange);
}

.search-wrap {
  flex: 1;
  max-width: 420px;
  position: relative;
}

.search-wrap::before {
  content: '⌕';
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 16px;
  pointer-events: none;
}

#search {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 7px 12px 7px 34px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}

#search:focus { border-color: var(--border-bright); }
#search::placeholder { color: var(--text-dim); }

.header-meta {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  white-space: nowrap;
  margin-left: auto;
}

#count-display {
  color: var(--green);
  font-weight: 700;
}

/* ── LAYOUT ── */
.layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  min-height: calc(100vh - 56px);
  position: relative;
  z-index: 1;
}

/* ── SIDEBAR ── */
aside {
  border-right: 1px solid var(--border);
  padding: 20px 0;
  position: sticky;
  top: 56px;
  height: calc(100vh - 56px);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--surface3) transparent;
}

.sidebar-section {
  margin-bottom: 24px;
}

.sidebar-label {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 0 16px;
  margin-bottom: 6px;
}

.cat-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 7px 16px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-family: var(--sans);
  font-size: 12px;
  text-align: left;
  cursor: pointer;
  transition: all 0.15s;
  border-left: 2px solid transparent;
}

.cat-btn:hover { color: var(--text); background: var(--surface2); }

.cat-btn.active {
  color: var(--green);
  border-left-color: var(--green);
  background: rgba(0,174,66,0.06);
}

.cat-icon {
  font-size: 11px;
  width: 16px;
  text-align: center;
  flex-shrink: 0;
  opacity: 0.7;
}

.cat-btn.active .cat-icon { opacity: 1; color: var(--green); }

.cat-count {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
}

.cat-btn.active .cat-count { color: var(--green); }

/* Diff filters */
.diff-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 0 16px;
}

.diff-btn {
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: none;
  font-family: var(--mono);
  font-size: 10px;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--text-dim);
}

.diff-btn:hover { border-color: var(--border-bright); color: var(--text-muted); }

.diff-btn.active.beginner { background: rgba(0,174,66,0.15); border-color: var(--green); color: var(--green); }
.diff-btn.active.intermediate { background: rgba(234,94,26,0.15); border-color: var(--orange); color: var(--orange); }
.diff-btn.active.advanced { background: rgba(220,120,20,0.12); border-color: #dc7814; color: #dc7814; }
.diff-btn.active.expert { background: rgba(200,50,50,0.12); border-color: #c43232; color: #c43232; }

/* ── MAIN CONTENT ── */
main {
  padding: 24px;
  min-width: 0;
}

.section-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

.section-title {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--green);
}

.section-count {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
}

/* ── CARD GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
  margin-bottom: 40px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.18s;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: transparent;
  transition: background 0.18s;
}

.card:hover {
  border-color: var(--border-bright);
  background: var(--surface2);
  transform: translateY(-1px);
}

.card:hover::before { background: var(--green); }
.card.active { border-color: var(--green); background: var(--surface2); }
.card.active::before { background: var(--green); }

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 4px;
}

.card-name {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
}

.card-badges {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  justify-content: flex-end;
  flex-shrink: 0;
}

.badge {
  font-family: var(--mono);
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 3px;
  white-space: nowrap;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.badge-beginner { background: rgba(0,174,66,0.15); color: #00AE42; }
.badge-intermediate { background: rgba(234,94,26,0.15); color: #EA5E1A; }
.badge-advanced { background: rgba(220,120,20,0.15); color: #dc7814; }
.badge-expert { background: rgba(200,50,50,0.15); color: #e04040; }

.card-full {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 6px;
  font-style: italic;
}

.card-temp {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--orange);
  margin-bottom: 6px;
}

.card-desc {
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 8px;
}

.tag {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 3px;
  background: var(--surface3);
  color: var(--text-dim);
  border: 1px solid rgba(255,255,255,0.04);
}

/* ── DETAIL PANEL ── */
#detail-panel {
  position: fixed;
  right: -540px;
  top: 56px;
  width: 520px;
  height: calc(100vh - 56px);
  background: var(--navy);
  border-left: 1px solid var(--border-bright);
  z-index: 200;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--surface3) transparent;
  transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  padding: 0;
}

#detail-panel.open { right: 0; }

.detail-header {
  position: sticky;
  top: 0;
  background: var(--navy);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px;
  z-index: 10;
}

.detail-close {
  position: absolute;
  top: 14px;
  right: 16px;
  background: var(--surface3);
  border: 1px solid var(--border);
  color: var(--text-muted);
  width: 28px;
  height: 28px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.detail-close:hover { background: var(--surface2); color: var(--text); border-color: var(--border-bright); }

.detail-name {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 700;
  color: var(--green);
  line-height: 1.2;
  margin-bottom: 4px;
  padding-right: 36px;
}

.detail-fullname {
  font-size: 12px;
  color: var(--text-muted);
  font-style: italic;
  margin-bottom: 10px;
}

.detail-meta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.meta-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 3px 8px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-muted);
}

.meta-pill-label {
  color: var(--text-dim);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.meta-pill.temp .meta-pill-val { color: var(--orange); }
.meta-pill.diff .meta-pill-val { color: var(--green); }

.detail-body {
  padding: 20px;
}

.detail-section {
  margin-bottom: 22px;
}

.detail-section-title {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--orange);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.detail-section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.detail-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.detail-list li {
  display: flex;
  gap: 10px;
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.55;
}

.detail-list li::before {
  content: '▸';
  color: var(--green);
  flex-shrink: 0;
  margin-top: 1px;
  font-size: 10px;
}

.detail-list.tips li::before { color: var(--orange); }
.detail-list.uses li::before { color: var(--text-dim); content: '→'; }

.use-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.use-tag {
  background: rgba(0,174,66,0.08);
  border: 1px solid rgba(0,174,66,0.2);
  color: var(--green);
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 4px;
}

/* ── EMPTY STATE ── */
.empty {
  grid-column: 1/-1;
  padding: 60px 20px;
  text-align: center;
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 12px;
}

.empty span { color: var(--green); }

/* ── OVERLAY ── */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 150;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

#overlay.show { opacity: 1; pointer-events: all; }

/* ── CATEGORY GROUP LABEL ── */
.cat-group-label {
  grid-column: 1/-1;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 8px 0 4px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.cat-group-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  aside { display: none; }
  #detail-panel { width: 100%; right: -100%; }
  #detail-panel.open { right: 0; }
}
</style>
</head>

<header>
  <div class="logo">3D<span>FIL</span> / Reference</div>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search filaments, materials, uses..." autocomplete="off" spellcheck="false">
  </div>

      <button class="cat-btn" data-cat="High-Performance">

        <button class="diff-btn active expert" data-diff="Expert">Expert</button>
      </div>
    </div>
  </aside>

  <main id="main-content">
    <div id="results"></div>
  </main>
</div>

<div id="overlay"></div>

<div id="detail-panel">
  <div class="detail-header">
    <button class="detail-close" id="detail-close">✕</button>
    <div class="detail-name" id="dp-name"></div>
    <div class="detail-fullname" id="dp-fullname"></div>
    <div class="detail-meta-row" id="dp-meta"></div>
  </div>
  <div class="detail-body" id="dp-body"></div>
</div>

ts","Anything that doesn't need heat resistance or high impact strength"]},{"name":"PLA+","fullName":"PLA Plus","category":"Standard","difficulty":"Beginner","tempNozzle":"190–230°C","tempBed":"0–60°C","tempChamber":"Not required","properties":["Modified PLA with impact modifiers and toughening additives","Noticeably less brittle than standard PLA — bends before snapping","Improved layer bonding compared to standard PLA","Marginally better heat resistance than standard PLA (~65°C)","Similar printability to standard PLA — no learning curve","Slightly more flexible surface feel"],"settings":["Nozzle: 200–230°C (typically 5–10°C higher than standard PLA for the same brand)","Bed: 50–60°C recommended for better adhesion","Cooling: High — same as standard PLA","Speed: 40–80mm/s; most PLA+ handles similar speeds to PLA","Retraction: Same as PLA — 0.5–2mm direct drive, 4–7mm Bowden"],"tips":["Don't assume PLA+ is interchangeable with PLA temp-wise — run a temp tower if switching brands","The toughening additives can cause slightly more stringing; increase retraction distance by 0.5mm if needed","Post-processing is slightly harder to sand than standard PLA due to increased toughness","Generally the better default choice over standard PLA for any functional part"],"uses":["Functional parts that need more toughness than standard PLA","Phone cases and consumer product prototypes","Snap-fit assemblies and clips","Light-duty mechanical parts","Parts that will be handled frequently and need to resist minor impacts"]},{"name":"Rapid / HS PLA","fullName":"High-Speed PLA","category":"Standard","difficulty":"Beginner","tempNozzle":"200–260°C","tempBed":"35–60°C","tempChamber":"Not required","properties":["Specially formulated PLA with lower viscosity at high temperatures for rapid flow","Compatible with high-flow nozzles (CHT, Volcano, etc.)","Maintains good surface quality at speeds that would cause under-extrusion in standard PLA","Similar mechanical properties to standard PLA","Av dles, brackets, and everyday mechanical parts","Parts that will be dropped, knocked, or stressed in normal use","A direct upgrade from standard PLA for most practical applications"]},{"name":"Matte PLA","fullName":"Matte PLA","category":"Standard","difficulty":"Beginner","tempNozzle":"195–225°C","tempBed":"50–60°C","tempChamber":"Not required","properties":["PLA blended with additives producing a flat, non-reflective surface","Hides layer lines more effectively than glossy PLA","Fingerprint-resistant surface — won't show handling marks","Slightly softer surface feel than standard PLA","Polymaker PolyTerra is the most popular formulation; also available from Bambu, eSUN, Elegoo","Zack Freedman B-tier"],"settings":["Nozzle: 200–220°C","Bed: 50–60°C","Cooling: High","Speed: 40–70mm/s — same as standard PLA"],"tips":["Paint adhesion is excellent — the matte texture grips primer and paint better than glossy PLA","Great for display models, miniatures, and cosplay props that will be painted","Sands very well — the matte surface sands to a smooth finish with less effort","Not structurally different from standard PLA — choose it for aesthetics, not strength"],"uses":["Display models and collector pieces","Cosplay props and wearables to be painted","Architectural models","Parts where fingerprints and reflections are undesirable","Miniatures and figurines"]},{"name":"LW-PLA","fullName":"Lightweight / Foaming PLA","category":"Standard","difficulty":"Intermediate","tempNozzle":"200–250°C","tempBed":"50–60°C","tempChamber":"Not required","properties":["Contains a chemical blowing agent that releases gas and expands the filament during extrusion","At activation temperature, filament expands up to 3x its original volume","Density as low as 0.54 g/cm³ — roughly half the weight of standard PLA","Closed-cell foam microstructure gives reasonable structural rigidity for weight","Essential material for RC aircraft fuselages and wings","eSUN ePLA-LW is the most widely used brand; also Prusament LW-PLA"],"settings":["Nozzle: 220–245°C for activation (expansion begins around 215–220°C depending on brand)","At 230°C: ~100% expansion (normal flow, low density)","At 240°C+: ~200% expansion (reduce flow rate to 40–50% to compensate)","Bed: 50–60°C","Flow rate tuning is critical — run a calibration print to find your ideal temp/flow combo","Speed: 30–60mm/s — slower than standard PLA","Cooling: Moderate"],"tips":["The key to LW-PLA is calibrating flow rate at your target temperature — every brand is slightly different","Print a single-wall calibration cube at various temps and flow rates; weigh the result to find the right combination","For RC aircraft, target 0.5–0.7 g/cm³ for a good strength-to-weight balance","Layer bonding is slightly weaker than standard PLA due to the foam structure — increase overlap/infill if strength is needed","Stringing can be worse than standard PLA; increase retraction by 1–2mm","Compatible with most standard PLA print surfaces and hardware"],"uses":["RC aircraft fuselages, wings, and nacelles","Drone frames and quadcopter bodies","Model rocketry components","Any application where weight is the primary design constraint","Floatation devices and buoyant objects"]},{"name":"HT-PLA","fullName":"High-Temperature PLA (Polymaker)","category":"Standard","difficulty":"Intermediate","tempNozzle":"200–235°C","tempBed":"50–60°C","tempChamber":"Not required","properties":["Polymaker's PLA formulation engineered for heat stability up to ~150°C without annealing","Standard PLA softens at ~60°C; HT-PLA maintains shape significantly above that","No oven annealing required — heat stability is built into the material","Also available in a glass-fiber reinforced variant for additional stiffness","Prints similarly to standard PLA","Not as heat resistant as engineering materials like ABS or Nylon — but dramatically better than PLA"],"settings":["Nozzle: 205–230°C","Bed: 50–60°C","Cooling: Moderate to high","Speed: 40–70mm/s"],"tips":["If your part will be near a heat source but not inside an enclosure, HT-PLA is often the simplest upgrade path","For even better heat resistance, the GF variant adds stiffness at temperature","Mechanical properties are similar to PLA — this is purely a heat resistance upgrade, not a strength upgrade"],"uses":["Parts near heat sources: light fixtures, electronics near components, automotive interior trim","Outdoor parts in hot climates","Anything that would be left in a hot car","Electronics enclosures with heat-generating components"]},{"name":"Silk PLA","fullName":"Silk PLA","category":"Standard","difficulty":"Beginner","tempNozzle":"195–230°C","tempBed":"50–60°C","tempChamber":"Not required","properties":["PLA with additives producing a high-gloss, shimmering, metallic-looking surface","Not structurally stronger than standard PLA — purely aesthetic modification","Surface layer lines appear reduced due to the reflective finish","Available in single-color, dual-color, and rainbow coextruded variants","Zack Freedman B-tier"],"settings":["Nozzle: 205–225°C — slightly higher than standard PLA for best sheen","Bed: 50–60°C","Cooling: Moderate — too much cooling can reduce the glossy effect","Speed: 40–60mm/s — slower printing produces better surface quality"],"tips":["The sheen is entirely surface-level — layer adhesion and structural properties are PLA-grade","Harder to paint than matte PLA — the glossy surface needs priming","Dual-color silk creates color-shift effects that change with viewing angle; print orientation matters for the visual effect","Avoid using for anything structural — choose Tough PLA or PLA+ instead"],"uses":["Trophies, awards, and display pieces","Figurines and collector models","Decorative vases and home decor","Cosplay props where a metallic look is desired without painting"]},{"name":"PolyWood","fullName":"PolyWood Faux Wood PLA (Polymaker)","category":"Standard","difficulty":"Beginner","tempNozzle":"195–220°C","tempBed":"50–60°C","tempChamber":"Not required","properties":["Polymaker's wood-look PLA using foaming technology instead of actual wood fibers","No wood particles means no clogging risk — a major advantage over traditional wood-fill filaments","Surface texture mimics wood grain convincingly","Can be sanded, stained, and varnished like real wood","Lighter than traditional wood-fill due to foam microstructure"],"settings":["Nozzle: 195–215°C","Bed: 50–60°C","Cooling: Moderate to high","Speed: 40–60mm/s"],"tips":["Staining with wood stain gives very convincing real-wood appearance","Sand between stain coats for best results — works just like real wood finishing","Higher print temperatures produce a darker, more 'burnt wood' look"],"uses":["Decorative wood-look items: bowls, frames, figurines","Furniture prototypes and architectural models","Props and set pieces","Any application where you want a wood aesthetic without actual wood"]},{"name":"PolyCast","fullName":"PolyCast Investment Casting PLA (Polymaker)","category":"Standard","difficulty":"Intermediate","tempNozzle":"195–225°C","tempBed":"50–60°C","tempChamber":"Not required","properties":["Specially formulated to burn out completely in an investment casting kiln with zero ash or residue","Standard PLA leaves carbon residue in molds — PolyCast does not","Enables lost-filament casting: print the model, invest in plaster, burn out, pour metal","Prints essentially identically to standard PLA","Compatible with standard jewelry casting and foundry investment plaster"],"settings":["Nozzle: 200–220°C","Bed: 50–60°C","Cooling: High","Speed: 40–60mm/s — same as standard PLA"],"tips":["Print with low infill (10–15%) or hollow to reduce burnout time and investment stress","Ensure complete burnout at 730°C+ for at least 1 hour","Works with silver, gold, brass, bronze, and other casting alloys","Surface finish of the print transfers directly to the casting — optimize print quality before investing"],"uses":["Jewelry casting (rings, pendants, custom pieces)","Small metal rinted","Over-smoothing causes the part to lose shape; work in short sessions","Avoid breathing IPA vapor — work in a ventilated area or use the Polysher enclosure","Store sealed — PVB absorbs moisture and will print poorly if damp"],"uses":["Display models requiring a smooth, painted appearance without sanding","Transparent vases, lamps, and light diffusers","Medical models where smooth surfaces are required","Any visual model where layer lines are unacceptable"]},{"name":"4D PLA","fullName":"eSUN 4D Shape-Memory PLA","category":"Standard","difficulty":"Intermediate","tempNozzle":"190–220°C","tempBed":"50–60°C","tempChamber":"Not required","properties":["Shape-memory PLA from eSUN — prints in one configuration, can be deformed, then returns to original shape when heated","True 4D printing: the fourth dimension is time/heat response","Maintains shape memory through multiple deformation-recovery cycles","Activation temperature typically 60–70°C (hot water or heat gun)","Mechanical properties similar to standard PLA at room temperature"],"settings":["Nozzle: 195–215°C","Bed: 50–60°C","Cooling: Moderate to high","Speed: 40–60mm/s"],"tips":["Program the 'memorized shape' during printing — the printed shape is what the part returns to","Deform while warm (above activation temp), hold in new shape while cooling to set the temporary shape","Useful for deployable structures, self-assembling mechanisms, and medical devices","Each brand's activation temperature varies — test before critical use"],"uses":["Self-straightening or self-deploying structures","Educational demonstrations of shape-memory materials","Soft actuators and deployable mechanisms","Medical and biomedical research applications"]},{"name":"Color-Change PLA","fullName":"UV / Temperature Color-Changing PLA","category":"Standard","difficulty":"Beginner","tempNozzle":"190–225°C","tempBed":"50–60°C","tempChamber":"Not required","properties":["PLA infused with photochromic (UV-reactive) or thermochromic (heat-reactive) pigments","UV variants change color in sunlight and revert indoors","Temp variants change color above a threshold temperature (typically 28–35°C)","eSUN's ePLA-Chameleon and ePLA-Magic are the most well-known formulations","Purely decorative — no mechanical advantage over standard PLA","Reviewed by Zack Freedman"],"settings":["Nozzle: 195–215°C","Bed: 50–60°C","Cooling: High","Speed: 40–70mm/s"],"tips":["UV variants fade over time with prolonged sun exposure — the pigments eventually wear out","Temp-change variants are great for novelty items and educational tools showing heat signatures","Structurally identical to standard PLA — don't use for anything where strength matters"],"uses":["Outdoor decor that changes with weather","Novelty items and toys","Educational models demonstrating temperature gradients","Cosplay props with UV light effects"]},{"name":"ABS","fullName":"Acrylonitrile Butadiene Styrene","category":"Standard","difficulty":"Intermediate","tempNozzle":"210–250°C","tempBed":"100–110°C","tempChamber":"Recommended (40–60°C)","properties":["Petroleum-based thermoplastic — tough, impact-resistant, and machinable","Heat resistance: ~100°C heat deflection temperature","Can be acetone-smoothed and acetone-welded — unique advantage over most filaments","High shrinkage rate causes warping — significant printing challenge","Emits styrene fumes during printing — requires ventilation","Tensile strength: ~40–50 MPa","Zack Freedman C-tier"],"settings":["Nozzle: 230–250°C (higher end for better layer bonding)","Bed: 100–110°C — PEI or garolite surfaces work best; use ABS slurry (ABS dissolved in acetone) on glass","Chamber: 40–60°C strongly recommended — the primary cause of ABS failure is cold ambient air","Cooling: Minimal to none — part cooling causes delamination and warping","Speed: 30–60mm/s","Enclosure: Effectively required for anything larger than a few centimeters"],"tips":["Warping is the #1 challenge — a proper enclosure with a heated bed at 110°C solves most issues","ABS slurry (ABS dissolved in acetone) applied to the glass bed is a classic and effective adhesion method","Print in a well-ventilated space or use an exhaust filter — styrene fumes are a real health concern","Acetone smoothing: brush pure acetone onto the surface for a glossy, layer-free finish","Acetone welding: join two ABS parts by applying acetone to the joint and clamping — creates a near-seamless bond","PETG, ASA, or PC blends have replaced ABS for most applications — use ABS primarily when you need acetone smoothing"],"uses":["Parts requiring acetone smoothing or welding","Automotive interior trim and enclosures near heat sources","Functional parts needing ~100°C heat resistance","Electrical enclosures and housings","Parts that will be machined or tapped after printing"]},{"name":"ASA","fullName":"Acrylonitrile Styrene Acrylate","category":"Standard","difficulty":"Intermediate","tempNozzle":"230–260°C","tempBed":"90–110°C","tempChamber":"Recommended","properties":["ABS replacement engineered specifically for outdoor and UV-exposed applications","Excellent UV stability — does not yellow, fade, or become brittle in sunlight","Heat resistance similar to ABS (~100°C)","Slightly less impact-resistant than ABS but better chemical resistance","Warps similarly to ABS — still requires heated bed and ideally an enclosure","Zack Freedman A-tier"],"settings":["Nozzle: 240–260°C","Bed: 90–110°C","Chamber: Recommended to reduce warping","Cooling: Minimal — same consideration as ABS","Speed: 30–60mm/s"],"tips":["ASA is strictly better than ABS for any outdoor application — no reason to use ABS outdoors","Can be acetone-smoothed like ABS — same technique applies","Fumes are less harsh than ABS but still present — ventilate","For enclosureless printing, keep ambient temperature above 20°C and avoid drafts","Bambu's ASA Aero adds foaming for a lightweight UV-resistant option for RC aircraft"],"uses":["Outdoor signs, enclosures, and fixtures","Automotive exterior trim and under-hood covers","RC vehicle bodies exposed to sunlight","Garden tools, outdoor brackets, and mounts","Any application needing ABS-class heat resistance plus UV stability"]},{"name":"ASA Aero","fullName":"ASA Aero (Bambu Lab)","category":"Standard","difficulty":"Intermediate","tempNozzle":"240–260°C","tempBed":"90–110°C","tempChamber":"Recommended","properties":["Bambu's lightweight foaming ASA — combines UV/weather resistance with reduced density","Expands during extrusion like LW-PLA for lower weight","Retains ASA's UV resistance and outdoor durability","Designed specifically for RC aircraft fuselages and drone bodies that need outdoor exposure","Similar concept to LW-ASA from colorFabb"],"settings":["Nozzle: 240–255°C — temperature controls foam expansion like LW-PLA","Bed: 90–110°C","Flow rate: Reduce to compensate for expansion (calibrate at target temperature)","Speed: 30–50mm/s"],"tips":["Calibrate foam expansion carefully — run a temp tower and weigh samples to dial in flow rate","Excellent for RC aircraft that will fly outdoors and need UV resistance LW-PLA lacks","Requires the same enclosure and bed temp care as standard ASA"],"uses":["RC aircraft fuselages and wings for outdoor flying","Lightweight outdoor structural parts","Drone bodies exposed to weathering"]},{"name":"PETG","fullName":"Polyethylene Terephthalate Glycol","category":"Standard","difficulty":"Beginner","tempNozzle":"220–250°C","tempBed":"70–85°C","tempChamber":"Not required","properties":["The 'goldilocks' filament — balanced properties between PLA and engineering materials","Heat resistance: ~80°C — significantly better than PLA","Good chemical resistance — food-safe if printed correctly (though layer adhesion is not truly food-safe)","Low warping — minimal bed adhesion requirements","Slightly flexible compared to PLA — good impact resistance without being brittle","Mild moisture resistance","Tensile strength: ~50–55 MPa","Zack Freedman A-tier"],"settings":["Nozzle: 230–245°C is the sweet spot for most brands","Bed: 70–85°C — PEI plate or glass with light adhesive; textured PEI works very well","Cooling: Moderate (30–50%) — PETG doesn't need aggressive cooling; too much causes poor layer adhesion","Speed: 40–70mm/s","No enclosure needed","Note: PETG sticks aggressively to smooth PEI — use a release agent or textured PEI"],"tips":["PETG strings more than PLA — increase retraction distance and enable combing/avoid-crossing","The biggest failure mode: printing too hot causes excessive stringing; drop temp by 5°C if strings appear","PETG can stick too well to smooth PEI sheets and rip the coating — use release agent (glue stick, hairspray) or use textured PEI","Excellent for watertight prints — PETG layers bond well and resist moisture","One of the best filaments for RC parts: good strength, some flex to absorb crashes, easy to print"],"uses":["Water bottles, containers, and food-adjacent applications","RC aircraft and drone components","Mechanical parts in moderate temperature environments","Outdoor parts that don't need full UV resistance (ASA is better for long-term UV)","Enclosures and housings where PLA's heat resistance is insufficient","Anything that needs to survive a dishwasher or mild chemical exposure"]},{"name":"Rapid PETG","fullName":"High-Flow / Rapid PETG","category":"Standard","difficulty":"Beginner","tempNozzle":"230–255°C","tempBed":"70–85°C","tempChamber":"Not required","properties":["High-speed formulation of PETG for use at 200–600mm/s on capable printers","Elegoo Rapid PETG and Bambu PETG HF are the most well-known versions","Maintains PETG's mechanical properties and ease of use","Requires high-flow hot end and fast printer to realize speed benefits"],"settings":["Nozzle: 240–255°C (higher than standard PETG to enable high flow)","Bed: 70–85°C","Cooling: High at high speeds","Speed: 100–600mm/s on capable machines"],"tips":["Same guidance as standard PETG — just faster on the right hardware","On a standard printer, rated to match real bone","Reviewed by Zack Freedman in Part 4 of Every Single Filament"],"settings":["Nozzle: 225–248°C","Bed: 70–85°C","Speed: 30–50mm/s"],"tips":["Follow 3DXTech's published profiles closely — the mechanical simulation depends on consistent settings","Use medical imaging (CT/MRI) scans as the basis for patient-specific surgical models","Hardened nozzle recommended due to filler content"],"uses":["Patient-specific surgical planning models","Medical school anatomy training","Surgical instrument testing and evaluation","Orthopedic implant sizing and trial fitting"]},{"name":"Reflect-o-Lay","fullName":"Reflect-o-Lay Retroreflective Filament (Lay Filaments)","category":"Specialty","difficulty":"Intermediate","tempNozzle":"190–220°C","tempBed":"50–60°C","tempChamber":"Not required","properties":["Retroreflective filament — returns light directly back to its source rather than scattering","Appears dark in ambient light but blazes bright when directly illuminated by a light source","Same retroreflective principle as road signs and high-visibility safety gear","Reviewed by Zack Freedman in Part 4"],"settings":["Nozzle: 195–215°C","Bed: 50–60°C","Speed: 30–50mm/s"],"tips":["The effect is only visible when a light source is near the viewer's eye — dramatic in low-light photos","Great for safety-adjacent wearable components and cycling gear","Effect depends on the specific glass bead coating — print quality affects retroreflectivity"],"uses":["High-visibility safety accessories","Reflective bike components and mounts","Safety signage visible only when lit directly","Night photography props"]},{"name":"Pegasus HGS-25","fullName":"Hollow Glass Sphere PP (Formfutura Pegasus HGS-25)","category":"Specialty","difficulty":"Advanced","tempNozzle":"220–240°C","tempBed":"85–100°C (PP tape)","tempChamber":"Not required","properties":["Polypropylene filled with 25% hollow borosilicate glass microspheres (by volume)","Density of 0.75 g/cm³ — the lightest conventional non-foaming filament","Hollow glass spheres are both thermally insulating and structural","Exceptional thermal insulation: low thermal conductivity from air-filled spheres","Extremely fragile — prints like papier-mâché; careful design required","Available in 2.85mm gauge only (drive gear damages 1.75mm version)","Zack printed a fridge with this that kept food frozen overnight — Part 5 featured material"],"settings":["Nozzle: 225–240°C","Bed: PP tape mandatory","Speed: 20mm/s maximum — fragility requires very slow printing","Cooling: Moderate"],"tips":["The part is genuinely fragile — designed for thermal insulation, not structural use","Print with thick walls (3–4 perimeters) and high infill for any functional use","2.85mm gauge only — the filament's fragility means the thinner gauge shatters at the drive gear","Appears to be discontinued but in permanent back-order status — source when found","The thermal insulation application is real and functional — the frozen fridge test is not a gimmick"],"uses":["Thermal insulation enclosures and coolers","Ultra-lightweight non-structural components","Buoyant parts (density below water at 0.75 g/cm³)","Cryogenic insulation applications"]}];

const CATS = ["Standard","Engineering","Flexible","Composites","Support Materials","High-Performance","Specialty","Eco / Bio-based"];
const CAT_ICONS = {"Standard":"◈","Engineering":"⬡","Flexible":"◎","Composites":"◆","Support Materials":"◇","High-Performance":"▲","Specialty":"★","Eco / Bio-based":"✿"};

let activeCat = 'all';
let activeDiffs = new Set(['Beginner','Intermediate','Advanced','Expert']);
let searchQuery = '';
let activeCard = null;

// Count per category
const catCounts = {};
CATS.forEach(c => { catCounts[c] = FILAMENTS.filter(f => f.category === c).length; });

// Update sidebar counts
CATS.forEach(c => {
  const el = document.getElementById('cnt-' + c.replace(/[^a-z]/gi,'_'));
  if (el) el.textContent = catCounts[c];
});
document.getElementById('cnt-all').textContent = FILAMENTS.length;

function getFiltered() {
  return FILAMENTS.filter(f => {
    if (activeCat !== 'all' && f.category !== activeCat) return false;
    if (!activeDiffs.has(f.difficulty)) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const haystack = [f.name, f.fullName, f.category, f.difficulty,
        ...(f.properties||[]), ...(f.settings||[]), ...(f.tips||[]), ...(f.uses||[])
      ].join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
}

function diffClass(d) {
  return d ? d.toLowerCase() : 'beginner';
}

function renderCard(f) {
  const desc = (f.properties||[]).slice(0,2).join(' · ') || '';
  const tags = (f.uses||[]).slice(0,3);
  return `<div class="card" data-name="${f.name.replace(/"/g,'&quot;')}" onclick="openDetail('${encodeURIComponent(JSON.stringify(f)).replace(/'/g,'%27')}', this)">
    <div class="card-top">
      <div class="card-name">${f.name}</div>
      <div class="card-badges"><span class="badge badge-${diffClass(f.difficulty)}">${f.difficulty}</span></div>
    </div>
    <div class="card-full">${f.fullName}</div>
    <div class="card-temp">🌡 ${f.tempNozzle}</div>
    <div class="card-desc">${desc}</div>
    <div class="card-tags">${tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
  </div>`;
}

function render() {
  const filtered = getFiltered();
  document.getElementById('count-display').textContent = filtered.length;

  const grouped = {};
  if (activeCat === 'all') {
    CATS.forEach(c => { grouped[c] = filtered.filter(f => f.category === c); });
  } else {
    grouped[activeCat] = filtered;
  }

  let html = '';
  const keys = activeCat === 'all' ? CATS : [activeCat];
  let total = 0;

  keys.forEach(cat => {
    const items = grouped[cat] || [];
    if (!items.length) return;
    total += items.length;
    if (activeCat === 'all') {
      html += `<div class="grid"><div class="cat-group-label">${CAT_ICONS[cat]||'◈'} ${cat} <span style="color:var(--text-dim);font-weight:400">(${items.length})</span></div>${items.map(renderCard).join('')}</div>`;
    } else {
      html += `<div class="grid">${items.map(renderCard).join('')}</div>`;
    }
  });

  if (total === 0) {
    html = `<div class="grid"><div class="empty">No filaments match — try a different search or filter<br><span>Try: "aerospace", "flexible", "nozzle 400", "beginner"</span></div></div>`;
  }

  document.getElementById('results').innerHTML = html;
}

function openDetail(encodedF, cardEl) {
  const f = JSON.parse(decodeURIComponent(encodedF));

  if (activeCard) activeCard.classList.remove('active');
  activeCard = cardEl;
  cardEl.classList.add('active');

  document.getElementById('dp-name').textContent = f.name;
  document.getElementById('dp-fullname').textContent = f.fullName;

  document.getElementById('dp-meta').innerHTML = `
    <div class="meta-pill diff"><span class="meta-pill-label">Level</span><span class="meta-pill-val">${f.difficulty}</span></div>
    <div class="meta-pill temp"><span class="meta-pill-label">Nozzle</span><span class="meta-pill-val">${f.tempNozzle}</span></div>
    <div class="meta-pill temp"><span class="meta-pill-label">Bed</span><span class="meta-pill-val">${f.tempBed}</span></div>
    <div class="meta-pill"><span class="meta-pill-label">Chamber</span><span class="meta-pill-val" style="color:var(--text-muted)">${f.tempChamber}</span></div>
    <div class="meta-pill"><span class="meta-pill-label">Category</span><span class="meta-pill-val" style="color:var(--text-muted)">${f.category}</span></div>
  `;

  let body = '';

  if (f.properties?.length) {
    body += `<div class="detail-section">
      <div class="detail-section-title">Properties</div>
      <ul class="detail-list">${f.properties.map(p => `<li>${p}</li>`).join('')}</ul>
    </div>`;
  }

  if (f.settings?.length) {
    body += `<div class="detail-section">
      <div class="detail-section-title">Print Settings</div>
      <ul class="detail-list">${f.settings.map(s => `<li>${s}</li>`).join('')}</ul>
    </div>`;
  }

  if (f.tips?.length) {
    body += `<div class="detail-section">
      <div class="detail-section-title">Tips & Tricks</div>
      <ul class="detail-list tips">${f.tips.map(t => `<li>${t}</li>`).join('')}</ul>
    </div>`;
  }

  if (f.uses?.length) {
    body += `<div class="detail-section">
      <div class="detail-section-title">Use Cases</div>
      <div class="use-tags">${f.uses.map(u => `<span class="use-tag">${u}</span>`).join('')}</div>
    </div>`;
  }

  document.getElementById('dp-body').innerHTML = body;

  const panel = document.getElementById('detail-panel');
  const overlay = document.getElementById('overlay');
  panel.classList.add('open');
  overlay.classList.add('show');
  panel.scrollTop = 0;
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  if (activeCard) { activeCard.classList.remove('active'); activeCard = null; }
}

document.getElementById('detail-close').addEventListener('click', closeDetail);
document.getElementById('overlay').addEventListener('click', closeDetail);

// Category buttons
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    closeDetail();
    render();
  });
});

// Difficulty buttons
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const d = btn.dataset.diff;
    if (activeDiffs.has(d)) {
      if (activeDiffs.size === 1) return;
      activeDiffs.delete(d);
      btn.classList.remove('active');
    } else {
      activeDiffs.add(d);
      btn.classList.add('active');
    }
    render();
  });
});

// Search
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  render();
});

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
  if (e.key === '/' && e.target !== document.getElementById('search')) {
    e.preventDefault();
    document.getElementById('search').focus();
  }
});

render();
</script>
</body>
</html>
